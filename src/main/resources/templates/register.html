<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register - Product Manager')}"></head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-t-8 border-[#800000]">
    <div class="p-8 md:p-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-sky-100 rounded-2xl mb-4">
                <span class="text-[#800000] text-3xl font-black">+</span>
            </div>
            <h2 class="text-3xl font-black text-gray-800">Register</h2>
        </div>

        <div th:if="${error}"
             class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg font-medium"
             th:text="${error}">
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Username</label>
                <input type="text" id="username" th:field="*{username}" required autofocus
                       placeholder="Masukkan username baru"
                       class="w-full mt-1 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all placeholder:text-gray-300">
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Password</label>
                <input type="password" id="password" th:field="*{password}" required
                       placeholder="Masukkan password"
                       class="w-full mt-1 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all placeholder:text-gray-300">
            </div>

            <div>
                <label for="confirmPassword" class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required
                       placeholder="Ulangi password"
                       class="w-full mt-1 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all placeholder:text-gray-300">
            </div>

            <button type="submit"
                    class="w-full bg-[#800000] hover:bg-[#a00000] text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 mt-4">
                Create Account
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <span class="text-sm text-gray-500 font-medium">Sudah punya akun? </span>
            <a th:href="@{/login}" class="text-sky-600 font-bold hover:text-sky-700 hover:underline transition-all">
                Login di sini
            </a>
        </div>
    </div>
</div>

</body>
</html>
