<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manajemen Kategori')}"></head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mx-auto px-6 flex-grow py-8 max-w-4xl">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-extrabold text-[#800000]">Kategori Produk</h2>
    <a th:href="@{/categories/new}" class="bg-sky-500 hover:bg-sky-600 text-white px-6 py-2.5 rounded-xl shadow-lg transition">
      + Tambah Kategori
    </a>
  </div>

  <div class="grid gap-6">
    <div th:each="category : ${categories}" class="bg-white p-6 rounded-2xl shadow-md border-l-8 border-[#800000] flex justify-between items-center hover:shadow-xl transition">
      <div>
        <h3 class="text-xl font-bold text-gray-800" th:text="${category.name}"></h3>
        <p class="text-gray-500 mt-1" th:text="${category.description}"></p>
      </div>
      <div class="flex space-x-4">
        <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="text-sky-600 font-bold">Edit</a>
        <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" class="inline">
          <button type="submit" class="text-red-500 font-bold">Hapus</button>
        </form>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
