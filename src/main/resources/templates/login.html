<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login - Product CRUD')}"></head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-t-8 border-[#800000]">
    <div class="p-8 md:p-10">
        <div class="text-center mb-10">
            <h3 class="text-3xl font-bold text-gray-800">Login</h3>
        </div>

        <div th:if="${param.error}"
             class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg font-medium">
            Username atau password salah!
        </div>

        <div th:if="${param.logout}"
             class="mb-6 p-4 bg-sky-50 border-l-4 border-sky-400 text-sky-700 text-sm rounded-r-lg font-medium">
            Berhasil logout.
        </div>

        <div th:if="${success}"
             class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 text-sm rounded-r-lg font-medium"
             th:text="${success}">
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-600 mb-1">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       placeholder="Masukkan username"
                       class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Masukkan password"
                       class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all">
            </div>

            <button type="submit"
                    class="w-full bg-[#800000] hover:bg-[#a00000] text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95">
                Login
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <span class="text-sm text-gray-500">Belum punya akun? </span>
            <a th:href="@{/register}" class="text-sky-600 font-bold hover:underline transition-all">
                Daftar di sini
            </a>
        </div>
    </div>
</div>

</body>
</html>
