<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${product.id == null ? 'Tambah Produk' : 'Edit Produk'} + ' - Product CRUD')}"></head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mx-auto px-4 py-10 flex-grow flex items-center justify-center">
    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden border-t-8 border-[#800000]">
        <div class="p-8 md:p-10">
            <h2 class="text-3xl font-black text-gray-800 mb-8 border-b pb-4"
                th:text="${product.id == null ? 'Tambah Produk Baru' : 'Edit Produk'}">Form Produk</h2>

            <form th:action="@{/products/save}" th:object="${product}" method="post" class="space-y-5">
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Nama Produk</label>
                        <input type="text" th:field="*{name}" required
                               class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Kategori</label>
                        <select th:field="*{category}" required
                                class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all bg-white cursor-pointer">
                            <option value="" disabled selected>Pilih Kategori</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Status Produk</label>
                        <div class="flex items-center space-x-3 p-3.5 bg-gray-50 border border-gray-200 rounded-xl">
                            <input type="checkbox" th:field="*{active}" id="active"
                                   class="w-5 h-5 text-sky-500 border-gray-300 rounded focus:ring-sky-400 cursor-pointer">
                            <label for="active" class="text-sm font-medium text-gray-700 cursor-pointer">Produk Aktif</label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Harga (Rp)</label>
                        <input type="number" th:field="*{price}" required
                               class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Stok</label>
                        <input type="number" th:field="*{stock}" required
                               class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all" />
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Deskripsi Produk</label>
                    <textarea th:field="*{description}" rows="3"
                              class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Tanggal Dibuat</label>
                    <input type="date" th:field="*{createdAt}" required
                           class="w-full p-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none transition-all cursor-pointer" />
                </div>

                <div class="flex items-center space-x-4 pt-6 border-t border-gray-100">
                    <button type="submit"
                            class="flex-1 bg-[#800000] hover:bg-[#a00000] text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95">
                        Simpan Produk
                    </button>
                    <a th:href="@{/products}"
                       class="flex-1 text-center text-gray-400 hover:text-gray-600 font-bold py-4 transition-all">
                        Batal
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
