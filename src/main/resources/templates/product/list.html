<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">
            + Tambah Produk Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <p class="text-muted">
        Total produk: <strong th:text="${#lists.size(products)}">0</strong>
    </p>

    <p class="text-gray-600 mb-4 font-medium">
        Total Data Produk: <span class="text-[#000033] font-bold" th:text="${totalItems}">0</span>
    </p>

    <form th:action="@{/products}" method="get" class="mb-4 flex gap-2" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" name="keyword" th:value="${param.keyword}" placeholder="Cari nama produk..."
               class="px-4 py-2 border rounded-md" style="flex-grow: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        <button type="submit" class="px-4 py-2 text-white rounded-md" style="background-color: #000033; padding: 8px 16px; border-radius: 5px;">Cari</button>
        <a th:href="@{/products}" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md" style="background-color: #e2e8f0; padding: 8px 16px; border-radius: 5px; text-decoration: none; color: black;">Reset</a>
    </form>
    <div th:if="${!#lists.isEmpty(products)}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, iterStat : ${products}">
                <td th:text="${iterStat.index + 1}">1</td>
                <td th:text="${product.name}">Nama Produk</td>
                <td th:text="${product.category?.displayName}">Kategori</td>
                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                <td th:text="${product.stock}">0</td>
                <td>
                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>
                <td>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Detail</a>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;"
                          onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                        <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${totalPages > 1}" class="mt-8 flex justify-center items-center gap-2" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">

            <a th:if="${currentPage > 1}"
               th:href="@{/products(page=${currentPage - 1}, keyword=${param.keyword})}"
               class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition font-medium" style="background-color: #e2e8f0; padding: 8px 16px; border-radius: 5px; text-decoration: none; color: black;">
                &laquo; Previous
            </a>

            <div class="flex gap-1" style="display: flex; gap: 5px;">
                    <span th:each="i : ${#numbers.sequence(1, totalPages)}">
                        <a th:href="@{/products(page=${i}, keyword=${param.keyword})}"
                           th:text="${i}"
                           th:style="${currentPage == i} ? 'background-color: #000033; color: white; padding: 8px 16px; border-radius: 5px; text-decoration: none;' : 'background-color: #f3f4f6; color: black; padding: 8px 16px; border-radius: 5px; text-decoration: none; border: 1px solid #ccc;'"
                           class="px-4 py-2 rounded-md transition font-medium border border-gray-200">
                        </a>
                    </span>
            </div>

            <a th:if="${currentPage < totalPages}"
               th:href="@{/products(page=${currentPage + 1}, keyword=${param.keyword})}"
               class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition font-medium" style="background-color: #e2e8f0; padding: 8px 16px; border-radius: 5px; text-decoration: none; color: black;">
                Next &raquo;
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <p class="text-muted fs-5">Belum ada produk.</p>
        <a th:href="@{/products/new}" class="btn btn-primary">Tambah Produk Pertama</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
