<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Daftar Produk - Product CRUD')}"></head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container mx-auto px-4 md:px-6 flex-grow py-8">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h2 class="text-3xl font-black text-[#800000]">Daftar Produk</h2>
            <p class="text-sm text-gray-500 mt-1 font-medium">
                Menampilkan <span class="text-sky-600 font-bold" th:text="${products.size()}">0</span>
                dari <span class="text-sky-600 font-bold" th:text="${totalItems}">0</span> total produk.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row w-full md:w-auto gap-3">
            <form th:action="@{/products}" method="get" class="relative flex-grow">
                <input type="text" name="search" th:value="${search}" placeholder="Cari nama produk..."
                       class="w-full sm:w-64 pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 focus:border-transparent outline-none shadow-sm transition-all text-sm">
                <div class="absolute left-3 top-3 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </form>

            <a th:href="@{/products/new}" class="bg-sky-500 hover:bg-sky-600 text-white px-6 py-2.5 rounded-xl shadow-lg transition-all transform active:scale-95 font-bold text-center">
                + Produk Baru
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded-r-lg text-sm font-medium" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-lg text-sm font-medium" th:text="${errorMessage}"></div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <table class="min-w-full">
            <thead class="bg-[#800000]">
            <tr>
                <th class="px-6 py-4 text-left text-xs font-bold text-white uppercase tracking-widest">Nama Barang</th>
                <th class="px-6 py-4 text-left text-xs font-bold text-white uppercase tracking-widest">Kategori</th>
                <th class="px-6 py-4 text-left text-xs font-bold text-white uppercase tracking-widest">Harga</th>
                <th class="px-6 py-4 text-left text-xs font-bold text-white uppercase tracking-widest">Stok</th>
                <th class="px-6 py-4 text-right text-xs font-bold text-white uppercase tracking-widest">Aksi</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <tr th:each="product : ${products}" class="hover:bg-sky-50 transition">
                <td class="px-6 py-5">
                    <div class="font-bold text-gray-800" th:text="${product.name}"></div>
                    <div class="text-[10px] text-gray-400 font-medium italic" th:text="${'Dibuat: ' + product.createdAt}"></div>
                </td>
                <td>
                            <span class="bg-sky-100 text-sky-700 px-3 py-1 rounded-lg text-xs font-bold"
                                  th:text="${product.category != null ? product.category.name : '-'}"></span>
                </td>
                <td class="px-6 py-5 text-gray-600 font-bold" th:text="${'Rp ' + product.price}"></td>
                <td class="px-6 py-5 text-gray-500" th:text="${product.stock}"></td>
                <td class="px-6 py-5 text-right space-x-3">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="text-gray-400 hover:text-sky-600 font-bold text-xs transition">Detail</a>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="text-sky-600 hover:text-sky-800 font-bold text-xs transition">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" class="inline">
                        <button type="submit" class="text-red-400 hover:text-red-600 font-bold text-xs transition" onclick="return confirm('Hapus produk?')">Hapus</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${products.isEmpty()}">
                <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Belum ada produk yang ditemukan.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${totalPages > 1}" class="flex justify-center mt-10 space-x-2">
        <a th:if="${currentPage > 1}" th:href="@{/products(page=${currentPage - 1}, search=${search})}"
           class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-xl hover:bg-sky-50 hover:text-sky-600 transition font-bold text-sm shadow-sm">
            &larr; Prev
        </a>

        <span class="px-4 py-2 bg-[#800000] text-white rounded-xl font-bold text-sm shadow-md" th:text="${currentPage}"></span>

        <a th:if="${currentPage < totalPages}" th:href="@{/products(page=${currentPage + 1}, search=${search})}"
           class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-xl hover:bg-sky-50 hover:text-sky-600 transition font-bold text-sm shadow-sm">
            Next &rarr;
        </a>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
